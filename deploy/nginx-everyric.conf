# everyric2 리버스 프록시 — 서브도메인 방식 (경로 방식은 FastAPI root_path 설정이
# 추가로 필요해서 권장하지 않음)
#
#   sudo cp deploy/nginx-everyric.conf /etc/nginx/sites-available/everyric
#   server_name 수정 → sites-enabled 심링크 → nginx -t → reload
#   HTTPS는 certbot --nginx -d everyric.example.com 이 이 블록을 기반으로 자동 구성

server {
    listen 80;
    server_name everyric.example.com;   # 실제 서브도메인으로 변경

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 번역·후보 검색 등 오래 걸리는 동기 요청 대비
        proxy_read_timeout 300s;
    }

    # 쿠키 파일 업로드 여유
    client_max_body_size 5m;
}
