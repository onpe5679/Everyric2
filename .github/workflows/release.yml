name: Release

on:
  push:
    tags:
      - "ae-v*"
      - "engine-v*"

permissions:
  contents: write

jobs:
  ae:
    if: startsWith(github.ref_name, 'ae-v')
    runs-on: windows-latest
    defaults:
      run:
        working-directory: everyric2-ae
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: everyric2-ae/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Prepare signing certificate
        shell: pwsh
        env:
          ZXP_CERT_BASE64: ${{ secrets.ZXP_CERT_BASE64 }}
        run: |
          if ($env:ZXP_CERT_BASE64) {
            $certPath = Join-Path $env:RUNNER_TEMP "cert.p12"
            [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:ZXP_CERT_BASE64))
            "EVERYRIC_CERT_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }
      - name: Build signed ZXP
        env:
          EVERYRIC_CERT_PASSWORD: ${{ secrets.ZXP_CERT_PASSWORD }}
        run: node scripts/build-zxp.mjs
      - name: Pick release notes
        id: notes
        shell: bash
        working-directory: .
        run: |
          if [ -f "docs/releases/${GITHUB_REF_NAME}.md" ]; then
            echo "path=docs/releases/${GITHUB_REF_NAME}.md" >> "$GITHUB_OUTPUT"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: true
          files: |
            everyric2-ae/release/*.zxp
            everyric2-ae/release/*-manual.zip
            everyric2-ae/release/SHA256SUMS.txt

  engine:
    if: startsWith(github.ref_name, 'engine-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Verify tag matches pyproject version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#engine-v}"
          PYPROJECT_VERSION="$(grep -m1 '^version' pyproject.toml | sed 's/.*"\(.*\)".*/\1/')"
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "tag version ($TAG_VERSION) != pyproject version ($PYPROJECT_VERSION)"
            exit 1
          fi
      - run: uv build
      - name: Pick release notes
        id: notes
        run: |
          if [ -f "docs/releases/${GITHUB_REF_NAME}.md" ]; then
            echo "path=docs/releases/${GITHUB_REF_NAME}.md" >> "$GITHUB_OUTPUT"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz

  update-latest:
    needs: [ae, engine]
    if: always() && (needs.ae.result == 'success' || needs.engine.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - run: node .github/scripts/update-latest.mjs "$GITHUB_REF_NAME"
      - name: Commit latest.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "chore: update latest.json for ${GITHUB_REF_NAME}"
          git push origin master
